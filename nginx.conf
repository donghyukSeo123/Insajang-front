server {
    listen 80;
    server_name 3-39-22-29.nip.io 3.39.22.29;

    # Certbot HTTP 챌린지 대응 (인증서 갱신용)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # 모든 HTTP 요청을 HTTPS로 강제 리다이렉트
    location / {
        return 301 https://3-39-22-29.nip.io$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 3-39-22-29.nip.io;

    # Let's Encrypt SSL 인증서 경로 설정
    ssl_certificate /etc/letsencrypt/live/3-39-22-29.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3-39-22-29.nip.io/privkey.pem;

    # SSL 보안 프로토콜 및 최적화
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 1. React 정적 파일 서빙
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API 요청 프록시 우회
    location /api/ {
        proxy_pass http://insajang-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. 업로드 이미지 요청 프록시 우회
    location /uploads/ {
        proxy_pass http://insajang-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
